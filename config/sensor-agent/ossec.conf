<ossec_config>
  <client>
    <server>
      <address>MANAGER_IP_PLACEHOLDER</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>ubuntu, ubuntu22, ubuntu22.04</config-profile>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
    <crypto_method>aes</crypto_method>
    <enrollment>
      <enabled>yes</enabled>
      <agent_name>AGENT_NAME_PLACEHOLDER</agent_name>
      <authorization_pass_path>etc/authd.pass</authorization_pass_path>
    </enrollment>
  </client>
    
  <!-- ============================================ -->
  <!-- 1. Linux Auditd 系统调用审计 -->
  <!-- ============================================ -->
  <localfile>
    <log_format>audit</log_format>
    <location>/var/log/audit/audit.log</location>
  </localfile>

  <!-- ============================================ -->
  <!-- 2. 系统日志监控 -->
  <!-- ============================================ -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/messages</location>
  </localfile>

  <!-- ============================================ -->
  <!-- 3. 文件完整性监控 -->
  <!-- ============================================ -->
  <syscheck>
    <disabled>no</disabled>
    
    <!-- 监控频率 -->
    <frequency>300</frequency>
    
    <!-- 关键目录监控 -->
    <directories check_all="yes" realtime="yes">/etc</directories>
    <directories check_all="yes" realtime="yes">/bin</directories>
    <directories check_all="yes" realtime="yes">/sbin</directories>
    <directories check_all="yes" realtime="yes">/usr/bin</directories>
    <directories check_all="yes" realtime="yes">/usr/sbin</directories>
    <directories check_all="yes" realtime="yes">/boot</directories>
    
    <!-- 用户目录监控 -->
    <directories check_all="yes">/root</directories>
    <directories check_all="yes">/home</directories>
    
    <!-- Web 目录监控 -->
    <directories check_all="yes" realtime="yes">/var/www</directories>
    
    <!-- 排除某些目录 -->
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/mail/statistics</ignore>
    <ignore>/etc/random-seed</ignore>
    <ignore>/etc/adjtime</ignore>
    
    <!-- 排除某些文件类型 -->
    <ignore type="sregex">.log$|.swp$</ignore>
    
    <!-- 检测属性 -->
    <check_sum>yes</check_sum>
    <check_sha1sum>yes</check_sha1sum>
    <check_sha256sum>yes</check_sha256sum>
    <check_size>yes</check_size>
    <check_owner>yes</check_owner>
    <check_group>yes</check_group>
    <check_perm>yes</check_perm>
    <check_mtime>yes</check_mtime>
    <check_inode>yes</check_inode>
  </syscheck>

  <!-- ============================================ -->
  <!-- 4. 主动响应 -->
  <!-- ============================================ -->
  <active-response>
    <disabled>no</disabled>
  </active-response>

  <!-- ============================================ -->
  <!-- 5. 规则集配置 -->
  <!-- ============================================ -->
  <ruleset>
    <!-- 默认规则集 -->
    <decoder_dir>ruleset/decoders</decoder_dir>
    <rule_dir>ruleset/rules</rule_dir>
    
    <!-- 排除不需要的规则 -->
    <rule_exclude>0215-policy_rules.xml</rule_exclude>
    
    <!-- 威胁情报列表 -->
    <list>etc/lists/audit-keys</list>
    <list>etc/lists/amazon/aws-eventnames</list>
    <list>etc/lists/security-eventchannel</list>

    <!-- 用户自定义规则 -->
    <decoder_dir>etc/decoders</decoder_dir>
    <rule_dir>etc/rules</rule_dir>
  </ruleset>

  <!-- ============================================ -->
  <!-- 6. 日志输出格式 -->
  <!-- ============================================ -->
  <alerts>
    <log_alert_level>3</log_alert_level>
    <email_alert_level>12</email_alert_level>
  </alerts>

  <logging>
    <log_format>json</log_format> 
  </logging>
</ossec_config>