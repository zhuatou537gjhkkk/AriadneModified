# 输入部分：监听来自 Node2 Filebeat 的数据
input {
  beats {
    port => 5044
  }
}

# 处理部分：这里可以根据需要添加过滤，目前保持原始 JSON
filter {
  # 如果需要对 Zeek 数据进行处理，可以在这里添加代码
}

# 输出部分：将数据写入“虚拟路径”
output {
  file {
    # 注意：这里的路径必须是容器内部的路径，稍后会在 docker run 中映射
    path => "/usr/share/logstash/external_data/conn.json"
    codec => json_lines
  }
}